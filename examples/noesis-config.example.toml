# Example Noesis manifest.
# This file is a control-plane manifest. pamem and LoreForge owner configs
# remain authoritative for their systems.

[noesis]
schema_version = "0.1"
workspace = "${workspace}"
entry_skill = "heuristic-intake"
minimum_noesis_version = "0.1.0"
mode = "workspace"

[components.pamem]
enabled = true
owner = "pamem"
config_path = ".pamem/config.toml"
required_cli = "pamem"
required_version = "0.1.0"
init_command = "pamem install ${workspace}"
status_command = "pamem status --workspace ${workspace} --json"
validate_command = "pamem lint --workspace ${workspace} --json"

[components.loreforge]
enabled = true
owner = "LoreForge"
required_cli = "loreforge"
required_version = "0.1.0"
required_entry_skill = "loreforge"
init_command = "loreforge init --wiki ${workspace} --domain ai-research --json"

[components.skill_manager]
enabled = true
owner = "Noesis"
required_cli = "noesis"
required_entry_skill = "noesis-skill-manager"
status_command = "noesis skill list --workspace ${workspace} --json"
validate_command = "noesis skill verify --workspace ${workspace} --json"

[paths]
events = ".noesis/events"
promote_requests = ".noesis/promote-requests"
proposals = ".noesis/proposals"
reports = ".noesis/reports"
